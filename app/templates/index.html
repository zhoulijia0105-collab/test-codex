<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>招聘决策对话工具（MVP）</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>招聘决策对话工具（MVP）</h1>
        <p class="subtitle">像资深顾问一样，先判断问题本质，再决定要不要通过招聘解决。</p>

        <div class="section" id="inputSection">
          <h2>第1步：描述你的问题</h2>

          <label>公司阶段（可选）</label>
          <input id="companyStage" type="text" placeholder="例如：业务扩张期" />

          <label>团队规模（可选）</label>
          <input id="teamSize" type="text" placeholder="例如：35人" />

          <label>你当前最想解决的问题</label>
          <textarea id="currentProblem" rows="4" placeholder="例如：销售线索很多，但转化率持续低，团队互相抱怨执行慢"></textarea>

          <button id="startBtn">开始顾问式诊断</button>
        </div>

        <div class="section hidden" id="dialogSection">
          <h2>第2步：三轮递进式提问</h2>
          <div class="bubble" id="restatement"></div>

          <div class="qa-box">
            <p class="question" id="currentQuestion"></p>
            <input id="answerInput" type="text" placeholder="请输入你的回答" />
            <button id="nextBtn">提交本轮回答</button>
          </div>

          <div id="history"></div>
        </div>

        <div class="section hidden" id="resultSection">
          <h2>第3步：诊断结论</h2>

          <div class="result-block">
            <h3>判断句（有立场）</h3>
            <p id="judgment"></p>
          </div>

          <div class="result-block">
            <h3>可通过招聘解决的部分</h3>
            <ul id="recruitableParts"></ul>
          </div>

          <div class="result-block">
            <h3>不能通过招聘解决的部分</h3>
            <ul id="nonRecruitableParts"></ul>
          </div>

          <div class="result-block hidden" id="talentProfileBlock">
            <h3>人才画像（仅在确实需要招聘时给出）</h3>
            <ul id="talentProfile"></ul>
          </div>

          <div class="result-block">
            <h3>唯一建议</h3>
            <p id="finalSuggestion"></p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const questions = [
        "Q1：这件事如果做好，最终要的结果是什么？",
        "Q2：现在有没有人对这个结果负责？",
        "Q3：是没人会做，还是没人负责？",
      ];

      const state = {
        step: 0,
        answers: ["", "", ""],
      };

      const startBtn = document.getElementById("startBtn");
      const nextBtn = document.getElementById("nextBtn");

      const inputSection = document.getElementById("inputSection");
      const dialogSection = document.getElementById("dialogSection");
      const resultSection = document.getElementById("resultSection");

      function appendHistory(question, answer) {
        const container = document.getElementById("history");
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = `<p><strong>${question}</strong></p><p>${answer}</p>`;
        container.appendChild(item);
      }

      function renderList(elId, items) {
        const el = document.getElementById(elId);
        el.innerHTML = "";
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          el.appendChild(li);
        });
      }

      startBtn.addEventListener("click", async () => {
        const payload = {
          company_stage: document.getElementById("companyStage").value.trim(),
          team_size: document.getElementById("teamSize").value.trim(),
          current_problem: document.getElementById("currentProblem").value.trim(),
        };

        if (!payload.current_problem) {
          alert("请先输入你当前最想解决的问题。");
          return;
        }

        const res = await fetch("/api/restate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        document.getElementById("restatement").textContent = data.restatement || "";
        document.getElementById("currentQuestion").textContent = data.next_question || questions[0];

        inputSection.classList.add("hidden");
        dialogSection.classList.remove("hidden");
      });

      nextBtn.addEventListener("click", async () => {
        const answer = document.getElementById("answerInput").value.trim();
        if (!answer) {
          alert("请先回答当前问题。");
          return;
        }

        appendHistory(questions[state.step], answer);
        state.answers[state.step] = answer;
        state.step += 1;
        document.getElementById("answerInput").value = "";

        if (state.step < 3) {
          document.getElementById("currentQuestion").textContent = questions[state.step];
          return;
        }

        const payload = {
          company_stage: document.getElementById("companyStage").value.trim(),
          team_size: document.getElementById("teamSize").value.trim(),
          current_problem: document.getElementById("currentProblem").value.trim(),
          q1_goal: state.answers[0],
          q2_owner: state.answers[1],
          q3_root: state.answers[2],
        };

        const res = await fetch("/api/decide", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        document.getElementById("judgment").textContent = data.judgment || "";
        document.getElementById("finalSuggestion").textContent = data.final_suggestion || "";

        renderList("recruitableParts", data.recruitable_parts || []);
        renderList("nonRecruitableParts", data.non_recruitable_parts || []);

        const talentProfileBlock = document.getElementById("talentProfileBlock");
        if (data.needs_hiring) {
          talentProfileBlock.classList.remove("hidden");
          renderList("talentProfile", data.talent_profile || []);
        } else {
          talentProfileBlock.classList.add("hidden");
        }

        document.getElementById("currentQuestion").textContent = "三轮问题已完成。";
        document.getElementById("answerInput").classList.add("hidden");
        nextBtn.classList.add("hidden");
        resultSection.classList.remove("hidden");
      });
    </script>
  </body>
</html>
